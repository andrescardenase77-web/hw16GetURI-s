<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Pacientes | Fábula Dental</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/user-views.css">
    <link rel="stylesheet" href="/css/forms.css">
</head>

<body class="bg-light">
    <div id="patientApp">
        <header class="bg-primary text-white shadow-sm">
            <div class="d-flex flex-column flex-md-row align-items-center justify-content-center gap-2 py-3">
                <h1 class="m-0 text-center">Registro de Pacientes - Área Odontológica</h1>
                <span class="badge bg-light text-primary fw-semibold">Vue.js</span>
            </div>
        </header>

        <main class="form-container">
            <div class="form-card shadow-sm">
                <h2 class="text-primary fw-bold mb-4">Ingreso de Datos Personales</h2>

                <form id="patientForm" class="form-grid" @submit.prevent="handleSubmit">
                    <div v-if="errors.length" class="alert alert-danger full-width">
                        <strong>Corrige los siguientes errores:</strong>
                        <ul class="mb-0">
                            <li v-for="(error, index) in errors" :key="index">{{ error }}</li>
                        </ul>
                    </div>

                    <div class="input-group">
                        <label for="fullName">Nombre Completo</label>
                        <input type="text" id="fullName" name="fullName" v-model.trim="form.fullName" required minlength="3" placeholder="Ej: Andrés Cárdenas">
                    </div>

                    <div class="input-group">
                        <label for="patientID">Cédula de Identidad</label>
                        <input type="text" id="patientID" name="patientID" v-model.trim="form.patientID" required pattern="[0-9]{10}" placeholder="1727095414">
                    </div>

                    <div class="input-group">
                        <label for="birthday">Fecha de Nacimiento</label>
                        <input type="date" id="birthday" name="birthday" v-model="form.birthday" min="1900-01-01" :max="today" required>
                    </div>

                    <div class="input-group">
                        <label for="phone">Teléfono de Contacto</label>
                        <input type="tel" id="phone" name="phone" v-model.trim="form.phone" required pattern="[0-9]{10}" placeholder="0991234567">
                    </div>

                    <div class="input-group">
                        <label for="gender">Género</label>
                        <select id="gender" name="gender" v-model="form.gender" required>
                            <option value="">Seleccione</option>
                            <option value="femenino">Femenino</option>
                            <option value="masculino">Masculino</option>
                            <option value="otro">Otro</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="legalRepresentative">Representante Legal (Opcional)</label>
                        <input type="text" id="legalRepresentative" name="legalRepresentative" v-model.trim="form.legalRepresentative" placeholder="Obligatorio si es menor de edad">
                    </div>

                    <div class="input-group full-width">
                        <label for="reasonForConsultation">Motivo de la Consulta</label>
                        <input type="text" id="reasonForConsultation" name="reasonForConsultation" v-model.trim="form.reasonForConsultation" required minlength="5" placeholder="Ej: Dolor en molar inferior derecho">
                    </div>

                    <div class="full-width mt-3">
                        <button type="submit" class="btn btn-primary w-100 fw-bold" :disabled="submitting">
                            {{ submitting ? 'Guardando...' : 'Guardar Historia Clínica' }}
                        </button>
                    </div>

                    <div class="full-width d-flex gap-2 mt-2">
                        <a href="/patients" class="btn btn-secondary flex-grow-1">Ver Lista</a>
                        <a href="/" class="btn btn-secondary flex-grow-1">Volver al Panel</a>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="/js/patient-form.js"></script>
</body>

</html>
